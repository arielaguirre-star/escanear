<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario IT V8 - Gestión de Duplicados</title>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #interactive.viewport {
            position: relative;
            width: 100%;
            height: 300px;
            overflow: hidden;
            background: #000;
            border-radius: 1.5rem;
            border: 4px solid #6366f1;
        }
        #interactive.viewport > video, #interactive.viewport > canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        canvas.drawing, canvas.drawingBuffer {
            position: absolute;
            left: 0;
            top: 0;
        }
        .scanner-guide {
            position: absolute;
            top: 50%;
            left: 5%;
            right: 5%;
            height: 2px;
            background: rgba(255, 0, 0, 0.7);
            box-shadow: 0 0 10px red;
            z-index: 10;
        }
        @keyframes flash {
            0% { background-color: rgba(52, 211, 153, 0.5); }
            100% { background-color: transparent; }
        }
        .flash-success {
            animation: flash 0.5s ease-out;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-md mx-auto p-4 pb-20">
        <header class="text-center py-6">
            <h1 class="text-2xl font-black text-indigo-900 tracking-tight">Inventario IT V8</h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em]">Control de Duplicados Activo</p>
        </header>

        <!-- Área de Escaneo -->
        <div class="bg-white p-4 rounded-3xl shadow-xl border border-slate-200 mb-6 relative overflow-hidden" id="scanner-container">
            <div id="interactive" class="viewport mb-4">
                <div class="scanner-guide"></div>
            </div>
            
            <div class="flex flex-col gap-3">
                <button id="btn-scan" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-lg uppercase">
                    Encender Cámara
                </button>
                <div id="status-msg" class="text-center text-[10px] text-slate-400 font-bold uppercase py-1">
                    Listo para escanear
                </div>
            </div>
        </div>

        <!-- Resultados -->
        <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-200">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-lg font-bold text-slate-800">Equipos en Lista</h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Toca la X para borrar un error</p>
                </div>
                <span id="counter" class="bg-indigo-600 text-white px-4 py-1 rounded-full text-sm font-black shadow-md shadow-indigo-100">0</span>
            </div>

            <div id="data-list" class="space-y-3 max-h-80 overflow-y-auto pr-1 custom-scrollbar">
                <p class="text-center py-10 text-slate-300 italic text-sm">No hay registros...</p>
            </div>

            <div class="mt-8 space-y-3">
                <button id="btn-download" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                    Exportar a Excel (.csv)
                </button>
                
                <button id="btn-reset" class="w-full text-slate-300 text-[10px] font-bold uppercase hover:text-red-500 py-2 transition-colors">
                    Borrar toda la lista
                </button>
            </div>
        </div>
    </div>

    <script>
        let scannedData = [];
        let isRunning = false;
        let lastScannedTime = 0;

        const btnScan = document.getElementById('btn-scan');
        const statusMsg = document.getElementById('status-msg');
        const dataList = document.getElementById('data-list');
        const counterElem = document.getElementById('counter');
        const scannerContainer = document.getElementById('scanner-container');

        function initQuagga() {
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#interactive'),
                    constraints: {
                        facingMode: "environment",
                        width: { min: 640, ideal: 1280 },
                        height: { min: 480, ideal: 720 }
                    },
                },
                decoder: {
                    readers: ["code_128_reader", "code_39_reader", "ean_reader"]
                },
                locate: true,
                halfSample: true,
                patchSize: "medium",
            }, function(err) {
                if (err) { alert("Error de cámara: " + err); return; }
                Quagga.start();
                isRunning = true;
                btnScan.innerText = "ESCANEO ACTIVO";
                btnScan.classList.replace('bg-indigo-600', 'bg-slate-800');
                statusMsg.innerText = "Buscando códigos...";
            });

            Quagga.onDetected(function(result) {
                const code = result.codeResult.code;
                const now = Date.now();

                // Evitar lecturas múltiples del mismo código en ráfaga (pausa de 2 seg)
                if (now - lastScannedTime > 2000) {
                    lastScannedTime = now;
                    intentarRegistrar(code);
                }
            });
        }

        function intentarRegistrar(codigo) {
            // Verificar si YA existe en la lista completa
            const existe = scannedData.some(item => item.codigo === codigo);

            if (existe) {
                statusMsg.innerText = "⚠️ CÓDIGO YA EXISTE EN LISTA";
                statusMsg.classList.add('text-orange-500');
                if (navigator.vibrate) navigator.vibrate(50);
                
                setTimeout(() => {
                    if(isRunning) {
                        statusMsg.innerText = "Buscando códigos...";
                        statusMsg.classList.remove('text-orange-500');
                    }
                }, 2000);
                return;
            }

            // Si es nuevo, registrar
            const time = new Date().toLocaleTimeString();
            scannedData.unshift({ 
                id: Date.now(), // ID único para poder borrarlo fácilmente
                codigo: codigo, 
                fecha: time 
            });
            
            renderList();
            
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            scannerContainer.classList.add('flash-success');
            setTimeout(() => scannerContainer.classList.remove('flash-success'), 500);
            statusMsg.innerText = "✅ REGISTRADO CON ÉXITO";
        }

        // Función para borrar un solo elemento
        function borrarRegistro(id) {
            scannedData = scannedData.filter(item => item.id !== id);
            renderList();
        }

        function renderList() {
            if (scannedData.length === 0) {
                dataList.innerHTML = `<p class="text-center py-10 text-slate-300 italic text-sm">No hay registros...</p>`;
            } else {
                dataList.innerHTML = scannedData.map((item, idx) => `
                    <div class="bg-white border border-slate-100 p-4 rounded-2xl flex justify-between items-center shadow-sm animate-in slide-in-from-right duration-300">
                        <div class="flex items-center gap-4">
                            <div class="w-8 h-8 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-600 font-bold text-xs">
                                ${scannedData.length - idx}
                            </div>
                            <div>
                                <div class="text-indigo-900 font-mono font-black text-base leading-none">${item.codigo}</div>
                                <div class="text-[10px] text-slate-400 font-bold mt-1">${item.fecha}</div>
                            </div>
                        </div>
                        <button onclick="borrarRegistro(${item.id})" class="p-2 text-slate-300 hover:text-red-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                `).join('');
            }
            counterElem.innerText = scannedData.length;
        }

        btnScan.addEventListener('click', () => {
            if (!isRunning) initQuagga();
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            if(confirm('¿Vaciar toda la lista?')) { 
                scannedData = []; 
                renderList(); 
            }
        });

        document.getElementById('btn-download').addEventListener('click', () => {
            if (scannedData.length === 0) return alert("Lista vacía");
            let csv = "data:text/csv;charset=utf-8,\uFEFFNro,Serie,Hora\n";
            scannedData.forEach((r, i) => csv += `${scannedData.length - i},${r.codigo},${r.fecha}\n`);
            const link = document.createElement("a");
            link.href = encodeURI(csv);
            link.download = `inventario_${new Date().toLocaleDateString().replace(/\//g,'-')}.csv`;
            link.click();
        });
    </script>
</body>
</html>
