<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Pro V3 - Compatibilidad Total</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #video-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 4 / 3;
            margin: auto;
            overflow: hidden;
            border-radius: 1rem;
            background: #000;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Guía de enfoque visual para el usuario */
        .focus-guide {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 30%;
            border: 2px dashed rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            pointer-events: none;
        }
        
        .scanner-line {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: #ff0000;
            box-shadow: 0 0 10px #ff0000;
            animation: scanMove 2s infinite ease-in-out;
        }

        @keyframes scanMove {
            0%, 100% { top: 35%; }
            50% { top: 65%; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-indigo-900 tracking-tight">Control de Activos IT</h1>
            <p class="text-slate-500 mt-2 text-sm uppercase tracking-widest font-semibold">Módulo de Captura de Datos</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Panel de Control y Cámara -->
            <div class="space-y-6">
                <div id="video-container">
                    <video id="video"></video>
                    <div class="focus-guide">
                        <div class="scanner-line"></div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div class="grid grid-cols-2 gap-4">
                        <button id="start-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg active:scale-95 text-sm">
                            Iniciar Cámara
                        </button>
                        <button id="reset-btn" class="bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-4 rounded-xl transition-all text-sm">
                            Borrar Lista
                        </button>
                    </div>
                    <p id="status" class="mt-4 text-center text-xs font-medium py-2 px-3 rounded-lg bg-slate-50 text-slate-400 border border-slate-100">
                        Estado: Esperando interacción
                    </p>
                </div>
            </div>

            <!-- Panel de Resultados -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col min-h-[400px]">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-slate-800">Equipos Registrados</h2>
                    <span id="counter" class="bg-indigo-600 text-white text-xs font-bold px-3 py-1 rounded-full">0</span>
                </div>

                <div id="data-list" class="flex-grow overflow-y-auto mb-6 pr-2 custom-scrollbar">
                    <div class="text-center py-20 text-slate-300">
                        <svg class="mx-auto h-12 w-12 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                        </svg>
                        <p class="text-sm">Lista vacía</p>
                    </div>
                </div>

                <button id="download-btn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-6 rounded-2xl transition-all shadow-md flex items-center justify-center gap-3 active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                    Descargar Excel (.csv)
                </button>
            </div>
        </div>

        <div class="mt-8 text-center text-slate-400 text-[10px] uppercase tracking-widest">
            Producido por el Profesor de Tecnología - Enfoque Constructivista
        </div>
    </div>

    <script>
        const codeReader = new ZXing.BrowserMultiFormatReader();
        let scannedData = [];
        let isScanning = false;

        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const downloadBtn = document.getElementById('download-btn');
        const dataList = document.getElementById('data-list');
        const statusText = document.getElementById('status');
        const counterElem = document.getElementById('counter');

        function updateUI() {
            if (scannedData.length === 0) {
                dataList.innerHTML = `
                    <div class="text-center py-20 text-slate-300">
                        <p class="text-sm">Lista vacía</p>
                    </div>`;
            } else {
                dataList.innerHTML = scannedData.map((item, index) => `
                    <div class="flex justify-between items-center bg-indigo-50 p-4 rounded-xl mb-3 border border-indigo-100 shadow-sm animate-in slide-in-from-left duration-300">
                        <div>
                            <p class="text-[10px] text-indigo-400 font-bold uppercase mb-1">Registro #${scannedData.length - index}</p>
                            <p class="text-slate-800 font-mono font-bold text-base leading-none">${item.codigo}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-slate-400">${item.fecha}</p>
                        </div>
                    </div>
                `).join('');
            }
            counterElem.innerText = scannedData.length;
        }

        async function initCamera() {
            try {
                isScanning = true;
                statusText.innerText = "CÁMARA LISTA - ESCANEANDO";
                statusText.classList.replace('text-slate-400', 'text-emerald-600');
                statusText.classList.add('bg-emerald-50', 'border-emerald-100');

                // Usamos la configuración más simple posible para asegurar que inicie en cualquier móvil
                await codeReader.decodeFromVideoDevice(undefined, 'video', (result, err) => {
                    if (result) {
                        const codigo = result.getText();
                        const timestamp = new Date().toLocaleTimeString();
                        
                        if (scannedData.length === 0 || scannedData[0].codigo !== codigo) {
                            scannedData.unshift({ codigo, fecha: timestamp });
                            updateUI();
                            
                            // Feedback táctico
                            if (window.navigator.vibrate) window.navigator.vibrate(100);
                        }
                    }
                });
            } catch (err) {
                console.error(err);
                statusText.innerText = "ERROR DE ACCESO: RECARGA LA PÁGINA";
                statusText.classList.replace('text-slate-400', 'text-red-600');
                isScanning = false;
            }
        }

        startBtn.addEventListener('click', () => {
            if (!isScanning) {
                initCamera();
                startBtn.disabled = true;
                startBtn.innerText = "Escáner On";
                startBtn.classList.replace('bg-indigo-600', 'bg-slate-800');
            }
        });

        resetBtn.addEventListener('click', () => {
            if(confirm('¿Vacíar el inventario actual?')) {
                scannedData = [];
                updateUI();
            }
        });

        downloadBtn.addEventListener('click', () => {
            if (scannedData.length === 0) return alert("Escanea equipos primero.");

            let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
            csvContent += "ID,Codigo_Equipo,Hora_Escaneo\n";
            scannedData.forEach((row, index) => {
                csvContent += `${scannedData.length - index},${row.codigo},${row.fecha}\n`;
            });

            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", `inventario_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
